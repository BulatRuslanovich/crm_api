global:
  scrape_interval: 5s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: crm-api
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8080"]
