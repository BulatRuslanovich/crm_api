name: CI

on:
  pull_request:
  push:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test, Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CrmWebApi.sln

      - name: Format check
        run: dotnet format CrmWebApi.sln --no-restore --verify-no-changes

      - name: Build
        run: dotnet build CrmWebApi.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CrmWebApi.sln --configuration Release --no-restore --no-build --logger trx --results-directory TestResults

      - name: Vulnerability audit
        run: dotnet list CrmWebApi.sln package --vulnerable --include-transitive

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore
