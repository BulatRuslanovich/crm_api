name: CI

on:
    pull_request:
        paths:
            - '**/*.cs'
            - '**/*.csproj'
            - '**/*.sln'
            - '.github/workflows/**'

    push:
        branches: [master, main]
        paths:
            - '**/*.cs'
            - '**/*.csproj'
            - '**/*.sln'
            - '.github/workflows/**'

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
    contents: read
    checks: write

jobs:
    build-test:
        name: Build, Test, Audit
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET SDK
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 10.0.x
                  cache: true
                  cache-dependency-path: '**/*.csproj'

            - name: Restore dependencies
              run: dotnet restore CrmWebApi.sln

            - name: Check code formatting
              run: dotnet format CrmWebApi.sln --no-restore --verify-no-changes

            - name: Build project
              run: dotnet build CrmWebApi.sln --configuration Release --no-restore

            - name: Run tests
              run: dotnet test CrmWebApi.sln --configuration Release --no-restore --no-build --logger trx --results-directory TestResults

            - name: Audit vulnerabilities (informational)
              run: dotnet list CrmWebApi.sln package --vulnerable --include-transitive

            - name: Publish Test Report to GitHub
              if: always()
              uses: dorny/test-reporter@v1
              with:
                  name: Test Results
                  path: TestResults/*.trx
                  reporter: dotnet-trx
                  fail-on-error: true

            - name: Upload test artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: TestResults/*.trx
                  if-no-files-found: ignore
                  retention-days: 5
