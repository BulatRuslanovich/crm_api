name: crm-demo

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env.local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    networks:
      - internal

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./provisioning/ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["/bin/sh", "/ollama-init.sh"]
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_MODEL: ${OLLAMA_MODEL:?OLLAMA_MODEL is required in .env.local}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - internal
      - egress

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: crm-demo/api:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=crm_db;Username=crm_user;Password=${DB_PASSWORD:?DB_PASSWORD is required in .env.local}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required in .env.local}
      Jwt__Issuer: PharmaCrmApi
      Jwt__Audience: PharmaCrmClient
      Auth__RequireEmailConfirmation: "false"
      Auth__OtpHashSecret: ${OTP_HASH_SECRET:?OTP_HASH_SECRET is required in .env.local}
      Cache__RedisConnectionString: redis:6379,abortConnect=false
      ForwardedHeaders__KnownProxies__0: 127.0.0.1
      ForwardedHeaders__KnownProxies__1: 172.28.0.10
      Assistant__Provider: cloud-fallback
      Assistant__Cloud__BaseUrl: https://api.groq.com/openai/v1
      Assistant__Cloud__Model: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      Assistant__Cloud__ApiKey: ${GROQ_API_KEY:?GROQ_API_KEY is required in .env.local}
    networks:
      internal:
        ipv4_address: 172.28.0.20
      egress: {}

  frontend:
    build:
      context: ${FRONTEND_PATH:?FRONTEND_PATH is required in .env.local (path to crm-web-portal checkout)}
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL?NEXT_PUBLIC_API_URL must be defined (empty string is OK for same-origin) in .env.local}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required in .env.local}
    image: crm-demo/frontend:local
    restart: unless-stopped
    depends_on:
      - api
    networks:
      internal:
        ipv4_address: 172.28.0.21

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile.demo:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    networks:
      internal:
        ipv4_address: 172.28.0.10
      public: {}

  loki:
    image: grafana/loki:2.9.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - internal

  promtail:
    image: grafana/promtail:2.9.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      - cadvisor
    networks:
      - internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required in .env.local}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UI_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/logs.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus
    networks:
      - internal
      - public

networks:
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  public:
    driver: bridge
  egress:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  ollama_data:
  grafana_data:
